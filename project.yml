name: LazyMap

options:
  bundleIdPrefix: com.lazymap
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26"

targets:
  LazyMap:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LazyMap
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: com.lazymap.ios
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "LazyMap использует геолокацию, чтобы показывать вашу позицию, скорость и записывать пройденные пути."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "LazyMap записывает пройденные пути в фоне, чтобы заполнять карту следами поездок."
