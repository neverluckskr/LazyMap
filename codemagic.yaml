workflows:
  ios-unsigned-ipa:
    name: Build Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: "26.5"

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Build (no signing)
        script: |
          xcodebuild build \
            -project LazyMap.xcodeproj \
            -scheme LazyMap \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            2>&1 | tee build_log.txt | grep -E "error:|warning:|BUILD FAILED|BUILD SUCCEEDED" || true
          grep -q "BUILD SUCCEEDED" build_log.txt

      - name: Package IPA (unsigned)
        script: |
          APP_PATH=$(find build/DerivedData -name "LazyMap.app" | head -1)
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r LazyMap.ipa Payload

    artifacts:
      - build/LazyMap.ipa
